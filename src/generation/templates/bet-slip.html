<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: #06080f;
    color: #ffffff;
    overflow: hidden;
  }

  .container {
    width: 1080px;
    min-height: 800px;
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at 20% 0%, #1a1040 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, #0d2a1a 0%, transparent 50%),
                linear-gradient(180deg, #080c18 0%, #0a1020 50%, #060e16 100%);
  }

  /* Ambient glow effects */
  .glow-top {
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(168,85,247,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .glow-bottom {
    position: absolute;
    bottom: -50px;
    right: -100px;
    width: 500px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(34,197,94,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Grid pattern overlay */
  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    padding: 50px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 12px;
  }

  .logo-container {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: linear-gradient(135deg, #a855f7, #6d28d9);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px rgba(168,85,247,0.4), 0 0 60px rgba(168,85,247,0.15);
    flex-shrink: 0;
  }

  .logo-container svg {
    width: 40px;
    height: 40px;
    fill: #ffffff;
  }

  .brand {
    display: flex;
    flex-direction: column;
  }

  .brand-name {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: 1px;
    color: #ffffff;
    line-height: 1.1;
  }

  .brand-tag {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #a855f7;
    margin-top: 2px;
  }

  /* Title section */
  .slip-title-section {
    margin: 30px 0 35px;
    position: relative;
  }

  .slip-title {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #e2e8f0;
  }

  .title-line {
    margin-top: 14px;
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg, #a855f7, #22c55e 50%, transparent 100%);
  }

  /* Bet cards */
  .bets-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .bet-card {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 22px 24px;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
  }

  .bet-index {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 16px;
    color: #fff;
    flex-shrink: 0;
    margin-right: 20px;
    box-shadow: 0 0 15px rgba(168,85,247,0.3);
  }

  .bet-details {
    flex: 1;
    min-width: 0;
  }

  .bet-match {
    font-size: 21px;
    font-weight: 700;
    color: #f1f5f9;
    margin-bottom: 5px;
    line-height: 1.3;
  }

  .bet-match .separator {
    color: #a855f7;
    margin: 0 10px;
    font-weight: 300;
    font-size: 16px;
  }

  .bet-type-label {
    font-size: 14px;
    color: #94a3b8;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .bet-quota {
    flex-shrink: 0;
    margin-left: 20px;
    min-width: 82px;
    text-align: center;
    padding: 10px 16px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(34,197,94,0.05));
    border: 1px solid rgba(34,197,94,0.3);
  }

  .bet-quota-value {
    font-size: 22px;
    font-weight: 800;
    color: #22c55e;
    text-shadow: 0 0 20px rgba(34,197,94,0.4);
  }

  /* Total section */
  .total-section {
    margin-top: 35px;
    padding: 30px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(168,85,247,0.08), rgba(34,197,94,0.06));
    border: 1px solid rgba(168,85,247,0.15);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .total-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(168,85,247,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .total-label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 10px;
    position: relative;
  }

  .total-value {
    font-size: 58px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1;
    position: relative;
    text-shadow: 0 0 40px rgba(168,85,247,0.5), 0 0 80px rgba(168,85,247,0.2);
  }

  /* Footer */
  .footer {
    margin-top: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .footer-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #a855f7;
  }

  .footer-text {
    font-size: 13px;
    color: #475569;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="container" id="slip">
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>
  <div class="grid-overlay"></div>

  <div class="content">
    <div class="header">
      <div class="logo-container">
        <!-- Boar / Cinghiale SVG icon -->
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="50" cy="55" rx="32" ry="26" fill="#fff"/>
          <ellipse cx="50" cy="50" rx="28" ry="22" fill="#e9d5ff"/>
          <ellipse cx="50" cy="52" rx="24" ry="18" fill="#fff"/>
          <!-- Head -->
          <ellipse cx="50" cy="42" rx="20" ry="16" fill="#fff"/>
          <!-- Ears -->
          <ellipse cx="34" cy="28" rx="7" ry="10" fill="#fff" transform="rotate(-15 34 28)"/>
          <ellipse cx="66" cy="28" rx="7" ry="10" fill="#fff" transform="rotate(15 66 28)"/>
          <ellipse cx="34" cy="28" rx="4" ry="7" fill="#d8b4fe" transform="rotate(-15 34 28)"/>
          <ellipse cx="66" cy="28" rx="4" ry="7" fill="#d8b4fe" transform="rotate(15 66 28)"/>
          <!-- Eyes -->
          <circle cx="42" cy="40" r="3.5" fill="#1e1b4b"/>
          <circle cx="58" cy="40" r="3.5" fill="#1e1b4b"/>
          <circle cx="43" cy="39" r="1.2" fill="#fff"/>
          <circle cx="59" cy="39" r="1.2" fill="#fff"/>
          <!-- Snout -->
          <ellipse cx="50" cy="50" rx="10" ry="7" fill="#f0abfc"/>
          <circle cx="46" cy="49" r="2.2" fill="#1e1b4b"/>
          <circle cx="54" cy="49" r="2.2" fill="#1e1b4b"/>
          <!-- Tusks -->
          <path d="M38 52 Q34 58 36 62" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M62 52 Q66 58 64 62" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
          <!-- Legs -->
          <rect x="36" y="68" width="6" height="14" rx="3" fill="#fff"/>
          <rect x="58" y="68" width="6" height="14" rx="3" fill="#fff"/>
          <rect x="42" y="70" width="5" height="12" rx="2.5" fill="#f0f0f0"/>
          <rect x="53" y="70" width="5" height="12" rx="2.5" fill="#f0f0f0"/>
        </svg>
      </div>
      <div class="brand">
        <div class="brand-name">Maremma Bet</div>
        <div class="brand-tag">Pronostici &amp; Scommesse</div>
      </div>
    </div>

    <div class="slip-title-section">
      <div class="slip-title" id="slip-title"></div>
      <div class="title-line"></div>
    </div>

    <div class="bets-list" id="bets-container"></div>

    <div class="total-section">
      <div class="total-label">Quota Totale</div>
      <div class="total-value" id="total-odd"></div>
    </div>

    <div class="footer">
      <span class="footer-text">Maremma Bet</span>
      <div class="footer-dot"></div>
      <span class="footer-text">Telegram</span>
    </div>
  </div>
</div>

<script>
  function render(data) {
    document.getElementById('slip-title').textContent = data.title.toUpperCase();
    document.getElementById('total-odd').textContent = data.totalOdd.toFixed(2);

    const container = document.getElementById('bets-container');
    container.innerHTML = '';

    data.bets.forEach((bet, i) => {
      const card = document.createElement('div');
      card.className = 'bet-card';
      card.innerHTML = `
        <div class="bet-index">${i + 1}</div>
        <div class="bet-details">
          <div class="bet-match">${escapeHtml(bet.homeTeam)}<span class="separator">vs</span>${escapeHtml(bet.awayTeam)}</div>
          <div class="bet-type-label">${escapeHtml(bet.betType)}</div>
        </div>
        <div class="bet-quota">
          <div class="bet-quota-value">${bet.odd.toFixed(2)}</div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
</script>
</body>
</html>
