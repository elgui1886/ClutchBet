# Content Generator Configuration
# Usage: npm run content

# Path to the parsed YAML profile (generated by: npm run parse-profile)
profile: "config/profiles/il-capitano.yaml"

# If true, shows each generated post for human review (approve/reject/edit) before publishing.
# If false (default), all generated posts are auto-approved and published directly.
reviewBeforePublish: false

# Telegram channel to publish content to
# Supported formats: Web URL, t.me link, @username, numeric ID
publishChannel: "https://t.me/maremmabet"

# Football league configuration
# Set THE_ODDS_API_KEY and FOOTBALL_DATA_API_KEY in .env
league:
  id: 135          # Serie A
  season: 2025     # Current season year
  country: "Italy"
