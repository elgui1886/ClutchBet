      📋 Selezione: {selection}
      📊 Quota: {odds}
      
      Attenzione: questa è ad alto rischio, gioca solo quello che puoi perdere.
      
      #LaGrandeOccasione
    example_posts:
      - |
        🚨 LA GRANDE OCCASIONE

        Stasera è serata di cartello. Tre partite grosse, quota totale che fa girare la testa. Ma il ragionamento c'è.

        🔹 Inter - Juventus: Goal @ 1.70
        Nei derby d'Italia degli ultimi 3 anni, entrambe segnano nel 70% dei casi. Lautaro e Vlahovic in serata.

        🔹 Napoli - Roma: Over 2.5 @ 1.95
        Il Napoli in casa è una macchina offensiva. La Roma concede. Ultimi 3 precedenti: 3-1, 2-1, 4-0.

        🔹 Milan - Atalanta: 1X @ 1.35
        Il Milan in casa tiene. L'Atalanta è forte ma a San Siro fatica. Milan imbattuto nelle ultime 5 casalinghe.

        📊 Quota totale: 4.48
        
        ⚠️ È una multipla, ragazzi. Il rischio è alto per definizione. Giocate solo quello che potete perdere senza rovinarvi la serata. Io ci metto il ragionamento, voi ci mettete la testa.

        #LaGrandeOccasione

