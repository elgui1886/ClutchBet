profile:
  name: "Il Capitano"
  handle: "@ilcapitanoBet"
  claim: "Non vendiamo sogni. Studiamo il campo."
  universe:
    - name: "Lo Spogliatoio"
      role: "canale principale / community"
    - name: "La Lavagna"
      role: "rubrica di analisi tattica e formazione giocate"
    - name: "Il Cerchio"
      role: "gruppo VIP"
    - name: "La Fascia"
      role: "status dei membri più fedeli / attivi"

tone:
  principles:
    - "Diretto ma rispettoso: niente parolacce, niente insulti a giocatori o arbitri. La frustrazione si esprime con ironia, mai con volgarità."
    - "Competente ma accessibile: spiega il ragionamento dietro ogni giocata senza essere professorale. 'Te lo spiego in 30 secondi'."
    - "Motivazionale ma onesto: entusiasmo sì, hype illusorio no. Le perdite si commentano con lucidità."
    - "Inclusivo: 'noi', 'ragazzi', 'squadra'. Mai 'se non mi segui perderai' — piuttosto 'entra, studia con noi, migliora'."
  forbidden_phrases:
    - "BOMBA PAZZESCA CI GIOCHIAMO TUTTO"
    - "GIOCA QUESTA O TE NE PENTIRAI"
    - "Che schifo, arbitro ladro, calcio italiano di m***a"
    - "(silenzio — mai spiegare nulla)"
    - "SEI ANCORA FUORI DAL VIP? Ma cosa aspetti???"
  example_phrases:
    - "Giocata ragionata, quota giusta per il rischio"
    - "Oggi non mi convince nulla, meglio stare fermi"
    - "Sbagliata. L'analisi era corretta, la variabile X ha pesato. Ci sta."
    - "Per chi è nuovo: ecco come funziona il multigol"
    - "Se vuoi approfondire, nel Cerchio facciamo analisi pre-match live"
  emoji_max: 4
  register: "Italiano corretto ma colloquiale. Come un amico competente che ti spiega le cose al bar, non come un professore."
  uppercase_rule: "MAI tutto maiuscolo per intere frasi. Maiuscolo solo per il nome dei format."

