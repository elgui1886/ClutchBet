      🔹 {match2}: {selection} @ {odds}
      🔹 {match3}: {selection} @ {odds}

      🎯 Quota totale: {total_odds}
      ⚠️ Alto rischio — gioca responsabilmente

      #LaCombo
    example_posts:
      - |
        🎰🔥 LA COMBO

        Ragazzi, oggi si alza l'asticella. La combo del giorno è così:

        🔹 Inter - Genoa: 1 + Over 1.5 @ 1.45
        🔹 Napoli - Lecce: Osimhen segna @ 2.10
        🔹 Roma - Monza: Over 2.5 @ 1.90
        🔹 Juve - Cagliari: Under 3.5 + 1X @ 1.55

