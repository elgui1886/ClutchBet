        ⚽🎯 MARCATORI

        Oggi è festa/oggi me la sento/oggi il piede è caldo: questi non possono NON segnare.

        🔹 Inter - Empoli | ore 20:45
        👤 Lautaro segna @ 1.75
        💬 3 gol nelle ultime 4. Contro l'Empoli si scatena. On fire.

        🔹 Napoli - Udinese | ore 18:00
        👤 Osimhen segna @ 2.00
        💬 Al Maradona è una bestia. 7 gol in casa quest'anno. Ci siamo.

        🎯 Quota totale: 3.50

        Questa la sento, ragazzi 🔥

        #Marcatori

