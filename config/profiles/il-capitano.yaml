formats:
  - name: "Schedina del Giorno"
    slug: "schedina-del-giorno"
    frequency: "daily_match_day"
    publish_time: "14:00"
    type: "regular"
    generate_image: true
    description: "La schedina principale: 2-5 selezioni 1X2 / Over-Under / Goal-NoGoal da partite diverse. Tono carico, ragionamento breve e istintivo per ogni selezione. Quota totale in evidenza."
    requires_data:
      - fixtures
      - odds
    template: |
      ⚽🔥 SCHEDINA DEL GIORNO

      🔹 {match1} | ore {time}
      📋 {selection} @ {odds}
      💬 {breve_ragionamento_istintivo}

      🔹 {match2} | ore {time}
      📋 {selection} @ {odds}
      💬 {breve_ragionamento_istintivo}

      🎯 Quota totale: {total_odds}

      {call_to_action_coinvolgente}

      #SchedinaDelGiorno
    example_posts:
      - |
        ⚽🔥 SCHEDINA DEL GIORNO

        Ragazzi stasera si fa sul serio. Tre partite, tre certezze.

        🔹 Napoli - Lecce | ore 18:00
        📋 1 @ 1.35
        💬 Il Napoli in casa è on fire. Il Lecce non ha mai vinto al Maradona. Non serve altro.

        🔹 Juventus - Bologna | ore 20:45
        📋 Under 2.5 @ 1.80
        💬 La Juve quando si chiude non la sfondi. Il Bologna fuori casa è sterile. Gol col contagocce.

        🔹 Roma - Monza | ore 15:00
        📋 Over 2.5 @ 1.90
        💬 La Roma concede, il Monza ci prova. Qui i gol arrivano.

        🎯 Quota totale: 4.62

        Ci siamo. Chi è nel Cerchio ha già la versione estesa 😏

        #SchedinaDelGiorno

