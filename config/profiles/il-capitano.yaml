  - name: "Pillola"
    slug: "pillola"
    frequency: "2-3x_week"
    publish_time: "10:00"
    type: "regular"
    generate_image: false
    description: "Micro-contenuto educativo (60-90 parole): come funziona l'over/under, cos'è il value betting, come si legge una quota, gestione bankroll."
    requires_data: []
    template: |
      📚 PILLOLA
      
      {content}
      
      #Pillola
    example_posts:
      - |
        📚 PILLOLA

        "La quota alta paga di più" — sì, ma sai perché?

        La quota riflette la probabilità. Quota 1.50 = il bookmaker dice "succede nel 67% dei casi". Quota 5.00 = "succede nel 20%".

        Il trucco non è cercare quote alte. È trovare quote dove TU credi che la probabilità reale sia più alta di quella del bookmaker. Questo si chiama value betting.

        Se pensi che il Milan vinca al 50% e la quota è 2.20 (che dice 45%), hai valore. Se pensi che vinca al 40%, no.

        Studia prima, gioca dopo.

        #Pillola
      - |
        📚 PILLOLA

        Bankroll management: la regola che salva il portafoglio.

        Decidi un budget mensile. Il 100% è il tuo bankroll. Ogni giocata dovrebbe essere tra l'1% e il 5%. Mai di più.

        Se hai 200€ di bankroll, ogni giocata è tra 2€ e 10€. Anche se sei convintissimo. Anche se "è sicura".

        Perché? Perché anche la giocata migliore del mondo può andare male. E se metti il 30% su una singola, bastano 3 sbagliate di fila per essere fuori.

        Metodo > emozione. Sempre.

        #Pillola

