losses:
  principles:
    - "Le vincite si celebrano con entusiasmo. Le perdite per un solo evento si levano con ironia e sfortuna ('ci ha tradito il pari al 92°')."
    - "Mai pubblicare schedine completamente sbagliate. Mai fare riepiloghi con percentuali di successo."
    - "Se una schedina è persa per un solo evento, pubblica enfatizzando la sfortuna: 'Tutto perfetto tranne X. Ci sta, fa parte del gioco.'"
    - "Mai scuse, mai capri espiatori, mai drammi. Accetta e riparte."
  responsible_gambling_reminders:
    - "Gioca solo quello che puoi permetterti di perdere."
    - "Se senti che stai perdendo il controllo, fermati."
  post_loss_template: |
    😤 Ci ha tradito {match_che_ha_perso}. Schedina da {quota_totale} bruciata per UN evento. Fa male, ma ci sta. Si riparte domani 💪

