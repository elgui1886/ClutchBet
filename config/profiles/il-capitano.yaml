  principles:
    - "Le perdite si pubblicano sempre, con la stessa visibilità delle vincite."
    - "Nessun capro espiatorio: niente 'arbitro ladro', 'sfortuna maledetta', 'calcio italiano corrotto'."
    - "Analisi post-mortem breve: 'Sbagliata. Il ragionamento su X era corretto, ma non avevo considerato Y. Ci sta, fa parte del gioco.'"
