formats:
  - name: "La Lavagna"
    slug: "la-lavagna"
    frequency: "weekly_friday_saturday"
    publish_time: "14:00"
    type: "regular"
    generate_image: true
    description: "Analisi tattica della giornata: 2-3 partite selezionate con ragionamento completo (statistiche, assenze, arbitro, trend). Da qui nascono le giocate del weekend."
    requires_data:
      - fixtures
      - odds
    template: |
      Template del post con placeholder:
      {match} | {league} | ore {time}
      Selezione: {selection}
    example_posts:
      - |
        📋 LA LAVAGNA

        Ragazzi, oggi si gioca e io vi racconto come la vedo.

        🔹 Juventus - Roma | Serie A | ore 20:45
        La Juve in casa non perde da 8 partite. Mourinho arriva con Dybala in dubbio e la difesa rimaneggiata. Nei precedenti: 5 vittorie bianconere nelle ultime 7. L'arbitro è Mariani, media 4.2 cartellini a partita.

        La mia lettura: partita spigolosa, la Roma si chiuderà. Ma la qualità della Juve alla lunga esce.
        📋 Selezione: 1X + Under 3.5
        📊 Quota: 1.62

        🔹 Napoli - Atalanta | Serie A | ore 18:00
        Due squadre che non si risparmiano mai. L'Atalanta segna in trasferta da 11 partite consecutive. Il Napoli in casa ha Over 2.5 nel 60% dei match. Lookman è una mina vagante.

        Qui non mi fido di nessuna difesa.
        📋 Selezione: Over 2.5
        📊 Quota: 1.90

        Chi è nel Cerchio ha già la versione estesa con gli scenari.

        #LaLavagna
      - |
        📋 LA LAVAGNA

        Stasera c'è roba seria, vi dico la mia.

        🔹 Inter - Milan | Serie A | ore 20:45
        Derby. Si butta via la tattica e si gioca col cuore. L'Inter è più forte sulla carta ma i derby non seguono la logica. Negli ultimi 6: 2 vittorie a testa e 2 pari. Theo è diffidato, Barella rientra.

        La sento equilibrata, con gol.
        📋 Selezione: Goal + Over 1.5
        📊 Quota: 1.55

        Come dico sempre: studiate il campo prima di mettere mano al portafoglio. Ne parliamo stasera nello Spogliatoio.

        #LaLavagna

