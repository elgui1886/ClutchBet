@if (auth.isLoggedIn()) {
  <mat-sidenav-container class="shell">
    <mat-sidenav mode="side" opened class="sidenav">
      <div class="brand">Agentic Workflow</div>
      <mat-nav-list>
        <a mat-list-item routerLink="/workflows" routerLinkActive="active">
          <mat-icon matListItemIcon>play_circle</mat-icon>
          <span>Workflows</span>
        </a>
        <a mat-list-item routerLink="/config" routerLinkActive="active">
          <mat-icon matListItemIcon>settings</mat-icon>
          <span>Configurazione</span>
        </a>
        <a mat-list-item routerLink="/env" routerLinkActive="active">
          <mat-icon matListItemIcon>vpn_key</mat-icon>
          <span>Ambiente (.env)</span>
        </a>
        <a mat-list-item routerLink="/prompts" routerLinkActive="active">
          <mat-icon matListItemIcon>description</mat-icon>
          <span>Prompt</span>
        </a>
        <a mat-list-item routerLink="/reports" routerLinkActive="active">
          <mat-icon matListItemIcon>assessment</mat-icon>
          <span>Report</span>
        </a>
      </mat-nav-list>
      <div class="sidenav-footer">
        <button mat-button (click)="logout()">
          <mat-icon>logout</mat-icon> Esci
        </button>
      </div>
    </mat-sidenav>
    <mat-sidenav-content>
      <router-outlet />
    </mat-sidenav-content>
  </mat-sidenav-container>
} @else {
  <router-outlet />
}
